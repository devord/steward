# Steward dashboard layout — which widgets show where. One file per
# dashboard in data/dashboards/; the filename is the dashboard's slug
# (`main` is the default board the app opens).
# Grid: `columns` on desktop (up to 6), ~`rowHeight`px row unit, `width`
# fixed|wide canvas. Each widget references a routine slug from
# routines.yaml. An optional `section:` files this board under a rail
# heading; the repo's `data/repo.yaml` `sections:` list orders them.
grid:
  columns: 4
  rowHeight: 150
  width: fixed
widgets:
  - routine: my-widget
    position: { col: 1, row: 1 }
    size: { cols: 2, rows: 2 }
