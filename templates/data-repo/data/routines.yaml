# Steward routines — the source of truth for what runs and when.
# Each routine names a `template:` — a routine template id, from Steward's
# built-ins (e.g. daily-plan, repo-pulse) or this repo's templates/routines/.
# The `custom` built-in runs your `instructions` as the whole brief.
# Optional per routine:
#   instructions: guidance for the template — for `custom`, the whole brief
#   params:       answers to the template's declared inputs — a string, or
#                 a list for repos-type params
#   schedule:     5-field cron; omit for a manual routine
#   host:         cloud (default) or local — local runs on your machine and
#                 is the only host that can read local data
#   repos:        extra source repos a CLOUD run needs beyond the two always
#                 attached (the Steward app repo + this data repo)
#   connectors:   MCP connector allowlist for a CLOUD run, by account name
#                 (e.g. GitHub, Google_Calendar). Omit → none
# Enact schedules and triggers with the routines:sync CLI, from a Steward
# checkout: `pnpm routines:sync --repo <owner>/<name> --apply`.
routines:
  - slug: my-widget
    name: My Widget
    # Freeform: the `custom` template turns your instructions into a widget.
    # Manual + local — run it from a Steward checkout with
    # `pnpm routine my-widget`; it can see anything on your machine.
    template: custom
    host: local
    instructions: |
      Replace me: describe the widget you want in plain words — what to
      gather, what to show, and the tone.
    enabled: false
