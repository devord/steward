# Bulletin routines — the source of truth for what runs and when.
# Each routine has a slug, a name, and a `template:` — a routine template
# by id, from bulletin's built-ins or this repo's templates/routines/
# (ADR-0021/0022). The `custom` built-in runs your `instructions` as the
# whole brief. Optional fields:
#   instructions: guidance for the template's run — for `custom`, the
#             entire content brief
#   params:   answers to the template's declared inputs (ADR-0020) — a
#             string, or a list for repos-type params
#   schedule: 5-field cron; omit for a manual routine, updated from the
#             widget's update button or `pnpm routine <slug>` (ADR-0016)
#   host:     cloud (default) or local — local runs on your machine and is
#             the only host that can read local data (ADR-0012)
#   repos:    extra source repos (owner/repo) a CLOUD run needs beyond the
#             two always attached — the bulletin app repo (contract skills
#             + built-in templates) and this data repo. A cloud run reaches
#             only attached repos; repos a template watches via a params
#             list are attached by the app automatically (ADR-0018/0020).
#             Ignored for local runs.
#   connectors: MCP connector allowlist for a CLOUD run, by account name
#             (e.g. GitHub, Google_Calendar). Omit → none: the run gets no
#             connectors rather than your whole account's set (ADR-0018).
#             Ignored for local runs (they inherit the machine's servers).
# Enact schedules and triggers with `pnpm routines:sync`. Edit via the
# Bulletin app or by hand.
routines:
  - slug: daily-plan
    name: Daily Plan
    template: daily-plan # a bulletin built-in (templates/routines/)
    schedule: "0 8 * * *"
    # It reads your calendar, so allow just that connector — nothing else:
    connectors: [Google_Calendar]
    instructions: |
      Replace me: which projects matter, what to ignore, tone.
    enabled: false
  - slug: meeting-prep
    name: Meeting Prep
    # Freeform (the custom template), manual, local: no schedule — run it
    # from a terminal (`pnpm routine meeting-prep`) right before you need
    # it, and it can see anything on your machine.
    template: custom
    host: local
    instructions: |
      Replace me: summarize today's calendar and the open threads that
      matter for each meeting, as one compact widget.
    enabled: false
