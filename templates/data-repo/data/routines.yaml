# Bulletin routines — the source of truth for what runs and when.
# Each routine: a skill from the shared repo's catalog, a cron schedule,
# and optional multiline `instructions` passed to the skill by the
# run-routine dispatcher. Edit via the Bulletin app or by hand.
routines:
  - slug: daily-plan
    name: Daily Plan
    skill: daily-plan
    schedule: "0 8 * * *"
    instructions: |
      Replace me: which projects matter, what to ignore, tone.
    enabled: false
# Opt in to the "Run now" button (ADR-0012). Off by default: a manual run
# spends a stored Claude credential, so turn it on deliberately and only once
# the run-routine workflow and its ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN
# secret are in place (see README → "Running a routine now").
manualRun: false
