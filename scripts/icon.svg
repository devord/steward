<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64">
  <!-- Source for the launcher icons — apple-touch-icon.png (180), icon-192.png,
       icon-512.png. The dark identity chip (Fold + Chip, DESIGN.md § Mark):
       fold wings, ink knot, contact shadow, crisp border, bevel. Rounded on
       transparent so iOS/Android mask cleanly. Regenerate (from repo root):

    CHROME="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
    for S in 180 192 512; do
      printf '<img src="scripts/icon.svg" width="%s" height="%s">' $S $S > /tmp/i.html
      "$CHROME" --headless --disable-gpu --hide-scrollbars --default-background-color=00000000 \
        --force-device-scale-factor=1 --window-size=$S,$S \
        --screenshot=/tmp/icon-$S.png "file:///tmp/i.html"
    done
    # -> apps/web/public/{apple-touch-icon(180),icon-192,icon-512}.png
  -->
  <defs>
    <linearGradient id="wl" gradientUnits="userSpaceOnUse" x1="10" y1="30" x2="28" y2="34">
      <stop offset="0" stop-color="#fe8019"/><stop offset="0.55" stop-color="#fe8019"/><stop offset="1" stop-color="#d65d0e"/>
    </linearGradient>
    <linearGradient id="wr" gradientUnits="userSpaceOnUse" x1="54" y1="30" x2="36" y2="34">
      <stop offset="0" stop-color="#fe8019"/><stop offset="0.55" stop-color="#fe8019"/><stop offset="1" stop-color="#d65d0e"/>
    </linearGradient>
    <linearGradient id="tl" gradientUnits="userSpaceOnUse" x1="32" y1="0" x2="32" y2="64">
      <stop offset="0" stop-color="#282828"/><stop offset="1" stop-color="#1d2021"/>
    </linearGradient>
    <clipPath id="cc"><rect width="64" height="64" rx="14"/></clipPath>
    <filter id="cs" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#tl)"/>
  <path d="M14 2 H50" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke="#504945" stroke-width="1.5"/>
  <g clip-path="url(#cc)" filter="url(#cs)" opacity="0.3" transform="translate(0 1.3)">
    <path d="M10 21.5 Q10 19 12.5 20 L28 28.5 L28 35.5 L12.5 44 Q10 45 10 42.5 Z" fill="#000"/>
    <path d="M54 21.5 Q54 19 51.5 20 L36 28.5 L36 35.5 L51.5 44 Q54 45 54 42.5 Z" fill="#000"/>
    <rect x="25.5" y="24" width="13" height="16" rx="4" fill="#000"/>
  </g>
  <path d="M10 21.5 Q10 19 12.5 20 L28 28.5 L28 35.5 L12.5 44 Q10 45 10 42.5 Z" fill="url(#wl)"/>
  <path d="M54 21.5 Q54 19 51.5 20 L36 28.5 L36 35.5 L51.5 44 Q54 45 54 42.5 Z" fill="url(#wr)"/>
  <rect x="25.5" y="24" width="13" height="16" rx="4" fill="#ebdbb2"/>
</svg>
