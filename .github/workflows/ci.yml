name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Catalog freshness (ADR-0006)
        run: |
          pnpm gen:catalog
          git diff --exit-code catalog/
      - run: pnpm exec vp check
      - run: pnpm run typecheck
      - run: pnpm run build
      - name: Install Chromium (vitest browser project)
        run: pnpm --filter @bulletin/web exec playwright install chromium --with-deps
      - run: pnpm test
