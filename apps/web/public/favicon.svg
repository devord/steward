<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- The product-icon chip: a self-contained tile that holds its edge on
       any tab colour (the bare glyph floated on pale/gray strips). Same
       geometry as the wordmark / launcher tiles — keep in sync (DESIGN.md
       § Mark). The identity is the Flexoki pair; flat fills (the fold
       gradient is invisible at 16px); the tile, border, bevel and inks swap
       with the browser's colour scheme.
       .ico + launcher icons bake the dark identity tile (can't media-query). -->
  <style>
    .tile{fill:#1c1b1a}.bd{stroke:#403e3c}.bev{stroke:#fff;stroke-opacity:.06}
    .wing{fill:#da702c}.knot{fill:#cecdc3}
    @media (prefers-color-scheme:light){
      .tile{fill:#fffcf0}.bd{stroke:#b7b5ac}.bev{stroke:#fff;stroke-opacity:.7}
      .wing{fill:#bc5215}.knot{fill:#100f0f}
    }
  </style>
  <rect class="tile" width="64" height="64" rx="14"/>
  <path class="bev" d="M14 2 H50" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <rect class="bd" x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke-width="1.5"/>
  <path class="wing" d="M28 28.2 C21.8 25 15.8 22 13 20.9 Q10 19.6 10 22.8 L10 25.4 C10.3 28.2 12.2 30.6 14.7 32 C12.2 33.4 10.3 35.8 10 38.6 L10 41.2 Q10 44.4 13 43.1 C15.8 42 21.8 39 28 35.8 Z"/>
  <path class="wing" d="M36 28.2 C42.2 25 48.2 22 51 20.9 Q54 19.6 54 22.8 L54 25.4 C53.7 28.2 51.8 30.6 49.3 32 C51.8 33.4 53.7 35.8 54 38.6 L54 41.2 Q54 44.4 51 43.1 C48.2 42 42.2 39 36 35.8 Z"/>
  <path class="knot" d="M28.7 24 L35.3 24 Q38.5 24 38.35 27.2 C37.6 29.3 37.6 34.7 38.35 36.8 Q38.5 40 35.3 40 L28.7 40 Q25.5 40 25.65 36.8 C26.4 34.7 26.4 29.3 25.65 27.2 Q25.5 24 28.7 24 Z"/>
</svg>
