<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- The product-icon chip: a self-contained tile that holds its edge on
       any tab colour (the bare glyph floated on pale/gray strips). Same
       geometry as the wordmark / launcher tiles — keep in sync (DESIGN.md
       § Mark). Flat fills (the fold gradient is invisible at 16px); the
       tile, border, bevel and inks swap with the browser's colour scheme.
       .ico + launcher icons bake the dark identity tile (can't media-query). -->
  <style>
    .tile{fill:#282828}.bd{stroke:#504945}.bev{stroke:#fff;stroke-opacity:.06}
    .wing{fill:#fe8019}.knot{fill:#ebdbb2}
    @media (prefers-color-scheme:light){
      .tile{fill:#f9f5d7}.bd{stroke:#bdae93}.bev{stroke:#fff;stroke-opacity:.7}
      .wing{fill:#d65d0e}.knot{fill:#3c3836}
    }
  </style>
  <rect class="tile" width="64" height="64" rx="14"/>
  <path class="bev" d="M14 2 H50" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <rect class="bd" x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke-width="1.5"/>
  <path class="wing" d="M10 21.5 Q10 19 12.5 20 L28 28.5 L28 35.5 L12.5 44 Q10 45 10 42.5 Z"/>
  <path class="wing" d="M54 21.5 Q54 19 51.5 20 L36 28.5 L36 35.5 L51.5 44 Q54 45 54 42.5 Z"/>
  <rect class="knot" x="25.5" y="24" width="13" height="16" rx="4"/>
</svg>
